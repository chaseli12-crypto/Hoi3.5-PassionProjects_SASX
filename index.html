<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Main Menu Screen -->
        <div class="screen" id="mainMenu">
            <h1>⚔️ Battle Simulator</h1>
            <div class="main-menu">
                <button class="btn btn-primary" id="battleBtn">Start Battle</button>
                <button class="btn btn-secondary" id="settingsBtn">Settings</button>
            </div>
        </div>

        <!-- Battle Screen -->
        <div class="screen hidden" id="battleScreen">
            <h2>⚔️ Battle Simulator</h2>
            <div class="battle-container">
                <!-- Faction 1 -->
                <div class="faction-box">
                    <h3>Faction 1</h3>
                    <div class="control-group">
                        <label for="faction1-select">Select Faction:</label>
                        <select id="faction1-select">
                            <option value="">-- Select Faction --</option>
                            <option value="Romans">Romans</option>
                            <option value="Persians">Persians</option>
                            <option value="Mongols">Mongols</option>
                            <option value="Islams">Islams</option>
                            <option value="Chinese">Chinese</option>
                        </select>
                    </div>
                    <div id="faction1-troops-container" class="troops-container"></div>
                </div>

                <!-- VS Divider -->
                <div class="vs-divider">VS</div>

                <!-- Faction 2 -->
                <div class="faction-box">
                    <h3>Faction 2</h3>
                    <div class="control-group">
                        <label for="faction2-select">Select Faction:</label>
                        <select id="faction2-select">
                            <option value="">-- Select Faction --</option>
                            <option value="Romans">Romans</option>
                            <option value="Persians">Persians</option>
                            <option value="Mongols">Mongols</option>
                            <option value="Islams">Islams</option>
                            <option value="Chinese">Chinese</option>
                        </select>
                    </div>
                    <div id="faction2-troops-container" class="troops-container"></div>
                </div>
            </div>

            <!-- Battle Actions -->
            <div class="battle-actions">
                <button class="btn btn-success" id="startBattleBtn" disabled>Start Battle</button>
                <button class="btn btn-secondary" id="backFromBattleBtn">Back</button>
            </div>

            <!-- Battle Result -->
            <div class="battle-result hidden" id="battleResult">
                <p id="resultText"></p>
            </div>
        </div>

        <!-- Settings Screen -->
        <div class="screen hidden" id="settingsScreen">
            <h2>⚙️ Settings</h2>
            <button class="btn btn-danger" id="resetDataBtn">Reset All Data</button>
            <button class="btn btn-secondary" id="backFromSettingsBtn">Back</button>
        </div>
    </div>

    <!-- Stats Editor Modal -->
    <div class="modal hidden" id="statsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Stats: <span id="editUnitName"></span></h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label for="editStrInput">Strength (STR):</label>
                    <input type="number" id="editStrInput" step="0.1" min="0" />
                </div>
                <div class="input-group">
                    <label for="editHpInput">Health (HP):</label>
                    <input type="number" id="editHpInput" step="0.1" min="0" />
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-success" id="saveStatsBtn">Save</button>
                <button class="btn btn-secondary" id="closeModalBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
